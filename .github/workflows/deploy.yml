name: 🚀 Deploy School Website
on:
  push:
    branches:
      - main
jobs:
  web-deploy:
    name: 🎉 Build and Sync Files
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Install dependencies
      run: npm install

    - name: 🔑 Create .env file
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
        echo "VULAVULA_API_KEY=${{ secrets.VULAVULA_API_KEY }}" >> .env
        echo "APP_URL=https://mthargreavessss.co.za" >> .env

    - name: 🏗️ Build project
      run: npm run build

    - name: 📂 Sync files to Host Africa
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: /domains/mthargreavessss.co.za/public_html/
        port: 21
        protocol: ftp
        local-dir: ./dist/
